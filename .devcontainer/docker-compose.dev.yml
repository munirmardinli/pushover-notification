---
services:
  app:
    image: node:18-alpine
    user: node
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
    ports:
      - 9095:9095
    environment:
      - NODE_ENV=development
      - PORT=9095
      - PUSHOVER_USER_KEY=${PUSHOVER_USER_KEY:-}
      - PUSHOVER_API_TOKEN=${PUSHOVER_API_TOKEN:-}
    command: sh -c "npm run dev"
    networks:
      - pushover-net

    # Für Entwicklung - Hot Reload
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

networks:
  pushover-net:
    driver: bridge

volumes:
  node_modules:
