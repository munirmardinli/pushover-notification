name: Production CI/CD Pipeline
on:
 push:
  branches:
   - main
 pull_request:
  branches:
   - main

env:
 IMAGE_TAG: latest
 BRANCH: ${{ github.ref_name }}
 BUILD_TIMESTAMP: ${{ github.event.timestamp }}
 DOCKER_REGISTRY: docker.io
 DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/pushover-notification

permissions:
 contents: write
 packages: write
 pages: write
 id-token: write

jobs:
 prepare:
  runs-on: ubuntu-latest
  outputs:
   node_modules_cache: ${{ steps.set-cache-output.outputs.cache-hit }}
  steps:
   - uses: actions/checkout@v4
   - name: Cache node modules
     id: cache-node-modules
     uses: actions/cache@v4
     with:
      path: |
       node_modules
       .npm
      key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
      restore-keys: ${{ runner.os }}-node-
   - name: Install dependencies
     run: npm ci
   - name: Set cache output
     id: set-cache-output
     run: echo "cache-hit=$(ls node_modules | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT

 lint:
  needs: prepare
  runs-on: ubuntu-latest
  steps:
   - uses: actions/checkout@v4
   - name: Restore cache
     uses: actions/cache@v4
     with:
      path: |
       node_modules
       .npm
      key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
   - name: Typecheck
     run: npx tsc --noEmit

 quality-assurance:
  needs: prepare
  runs-on: ubuntu-latest
  steps:
   - name: Checkout code
     uses: actions/checkout@v4
   - name: Set up Node.js
     uses: actions/setup-node@v4
     with:
      node-version: 20
   - name: Install dependencies
     run: npm ci
   - name: Run npm audit
     run: npm audit --audit-level=moderate

 build-prod:
  needs: [lint]
  runs-on: ubuntu-latest
  steps:
   - uses: actions/checkout@v4
   - name: Restore cache
     uses: actions/cache@v4
     with:
      path: |
       node_modules
       .npm
      key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
   - name: Build application
     run: |
      npm run build
      npx typedoc
     env:
      NODE_ENV: production
      GOTIFY_PORT: 9095
   - name: Upload artifacts
     uses: actions/upload-artifact@v4
     with:
      name: dist-prod
      path: |
       dist
       node_modules
   - name: Upload node_modules separately
     uses: actions/upload-artifact@v4
     with:
      name: prod-dependencies
      path: node_modules

 publish-npm:
    needs: build-prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: prod-dependencies
          path: node_modules
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Build npm package
        run: |
          npm run npm
      - name: Publish to NPM
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

 docker-prod:
  if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  needs: build-prod
  runs-on: ubuntu-latest
  permissions:
   contents: read
  steps:
   - uses: actions/checkout@v4

   - name: Download artifacts
     uses: actions/download-artifact@v4
     with:
      name: dist-prod
      path: .

   - name: Cache Docker layers
     uses: actions/cache@v4
     with:
      path: /tmp/.buildx-cache
      key: ${{ runner.os }}-buildx-${{ github.sha }}
      restore-keys: |
       ${{ runner.os }}-buildx-

   - name: Set up Docker Buildx
     uses: docker/setup-buildx-action@v3

   - name: Log in to Docker Hub
     uses: docker/login-action@v3
     with:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

   - name: Extract metadata for Docker Hub
     id: meta
     uses: docker/metadata-action@v5
     with:
      images: ${{ env.DOCKER_IMAGE_NAME }}
      tags: |
       type=raw,value=latest
       type=raw,value=${{ env.BRANCH }}

   - name: Build and push Docker image to Docker Hub
     uses: docker/build-push-action@v6
     with:
      context: .
      file: .github/Dockerfile
      push: true
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      cache-from: type=local,src=/tmp/.buildx-cache
      cache-to: type=local,dest=/tmp/.buildx-cache-new
      build-args: |
       NODE_ENV=production
       BRANCH=${{ env.BRANCH }}
       BUILD_TIMESTAMP=${{ env.BUILD_TIMESTAMP }}
       GITHUB_REPO=${{ github.repository }}
       GITHUB_OWNER=${{ github.repository_owner }}
       GITHUB_WORKFLOW_NAME=${{ github.workflow }}
       GITHUB_REF_NAME=${{ github.ref_name }}
       GITHUB_REF_TYPE=${{ github.ref_type }}
       GITHUB_RUN_NUMBER=${{ github.run_number }}
       GITHUB_RUN_ID=${{ github.run_id }}
       GITHUB_RUN_ATTEMPT=${{ github.run_attempt }}
       GITHUB_ACTOR=${{ github.actor }}
       BUILD_TIMESTAMP=${{ env.BUILD_TIMESTAMP }}

   - name: Move cache
     run: |
      rm -rf /tmp/.buildx-cache
      mv /tmp/.buildx-cache-new /tmp/.buildx-cache

 deploy-docs:
  needs: build-prod
  if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  runs-on: ubuntu-latest
  permissions:
   pages: write
   id-token: write
  environment:
   name: github-pages
   url: ${{ steps.deployment.outputs.page_url }}
  steps:
   - uses: actions/checkout@v4
   - name: Download artifacts
     uses: actions/download-artifact@v4
     with:
      name: dist-prod
      path: .
   - name: Prepare deployment
     run: |
      mkdir -p deploy-docs
      cp -r dist/docs/* deploy-docs/
   - name: Setup Pages
     uses: actions/configure-pages@v5
   - name: Upload artifact
     uses: actions/upload-pages-artifact@v3
     with:
      path: "deploy-docs"
      retention-days: 1
   - name: Deploy to GitHub Pages
     id: deployment
     uses: actions/deploy-pages@v4

 upload-readme:
  needs: docker-prod
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4

    - name: Upload README.md to Docker Hub
      run: |
        echo "{\"full_description\": $(jq -Rs . < README.md)}" | \
        curl --fail -X PATCH https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/pushover-notification/ \
          -H "Content-Type: application/json" \
          -H "Authorization: JWT $TOKEN" \
          -d @-
      env:
        TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

 release:
  if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  needs:
    - docker-prod
    - deploy-docs
    - publish-npm
    - build-prod
  runs-on: ubuntu-latest
  permissions:
    contents: write
    issues: write
    pull-requests: write
  steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm ci

    - name: Run Semantic Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: npx semantic-release
